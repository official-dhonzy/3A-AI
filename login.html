<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3A AI - Login & Signup</title>

<style>
.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #111 0%, #1e1e1e 100%);
  padding: 20px;
}

.auth-box {
  background: #181818;
  border-radius: 20px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
}

.auth-header {
  text-align: center;
  margin-bottom: 30px;
}

.auth-header h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.auth-header p {
  color: #999;
  font-size: 14px;
}

.auth-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
  background: #222;
  padding: 5px;
  border-radius: 10px;
}

.auth-tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: #999;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  border-radius: 8px;
  transition: all 0.3s ease;
}

.auth-tab.active {
  background: #2ecc71;
  color: black;
}

.auth-form {
  display: none;
}

.auth-form.active {
  display: block;
}

.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  font-size: 12px;
  color: #999;
  margin-bottom: 5px;
  text-transform: uppercase;
}

.form-group input {
  width: 100%;
  padding: 12px;
  border: 1px solid #333;
  background: #222;
  color: white;
  border-radius: 8px;
  font-size: 14px;
  transition: border-color 0.3s ease;
}

.form-group input:focus {
  outline: none;
  border-color: #2ecc71;
}

.password-toggle {
  position: relative;
}

.password-toggle button {
  position: absolute;
  right: 12px;
  top: 35px;
  background: none;
  border: none;
  color: #999;
  cursor: pointer;
  font-size: 16px;
  padding: 0;
}
