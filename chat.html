<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3A AI Chat</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="top-bar">


<button onclick="location.href='menu.html'">
☰
</button>


<h1>
🌍
<span class="red">3</span>
<span class="yellow">A</span>
<span class="green">AI</span>
</h1>


<button onclick="newChat()">
+
</button>


</header>





<main id="chat-box">


<div class="ai-message">

👋 Hello! I am 3A AI.

<br><br>

Your African AI assistant.

<br><br>

Ask me anything about:

<br><br>

🌱 Agriculture

<br>
📚 Education

<br>
🏥 Health

<br>
🚰 Sanitation

<br>
💼 Business

<br>
💻 Technology

</div>


</main>





<footer class="chat-input">


<button>
📎
</button>



<button onclick="startVoice()">
🎤
</button>




<input

id="question"

type="text"

placeholder="Ask 3A AI anything..."

>


<button onclick="sendMessage()">
➤
</button>



</footer>





<script type="module" src="ai.js"></script>

<script src="script.js"></script>


</body>

</html>
