<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3A AI Chat</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top-bar">

    <h1>
        🌍 <span class="red">3</span><span class="yellow">A</span><span class="green">AI</span>
    </h1>

    <button onclick="location.href='home.html'">
        ←
    </button>

</header>


<main id="chat-box">

    <div class="ai-message">
        👋 Hello! I am 3A AI.
        <br>
        How can I help you today?
    </div>

</main>


<footer class="chat-input">

    <button>
        📎
    </button>

    <button>
        🎤
    </button>


    <input 
        id="question"
        type="text"
        placeholder="Ask 3A AI anything..."
    >


    <button onclick="sendMessage()">
        ➤
    </button>

</footer>


<script src="script.js"></script>

</body>
</html>
