<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

// Handle pre-filled questions from feature pages
window.addEventListener('load', function() {
  const preFilled = sessionStorage.getItem('preFilled');
  if (preFilled) {
    document.getElementById('question').value = preFilled;
    sessionStorage.removeItem('preFilled');
  }
});

// Save current question to favorites
window.saveCurrentToFavorites = function() {
  const question = document.getElementById('question').value.trim();
  
  if (!question) {
    alert('⚠️ Enter a question first');
    return;
  }
  
  const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
  
  const duplicate = favorites.find(fav => fav.question.toLowerCase() === question.toLowerCase());
  if (duplicate) {
    alert('Already in favorites!');
    return;
  }
  
  favorites.push({
    question: question,
    date: new Date().toISOString()
  });
  
  localStorage.setItem('favorites', JSON.stringify(favorites));
  alert('⭐ Saved to favorites!');
};
</script>
