<!DOCTYPE html>
<html>
<head>
  <title>3A AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h1>3A AI</h1>
  <p>Accessible • Affordable • African AI</p>

  <input id="question" type="text" placeholder="Ask 3A AI anything...">

  <button onclick="askAI()">Ask</button>

  <p id="answer">Your answer will appear here.</p>

  <h2>Explore Africa's Solutions</h2>

  <button>🌱 Agriculture</button>
  <button>📚 Education</button>
  <button>🏥 Health</button>
  <button>🚰 Sanitation</button>
</div>

<script>
function askAI() {
  let question = document.getElementById("question").value;
  let answer = document.getElementById("answer");

  if (question.trim() === "") {
    answer.innerHTML = "Please ask a question.";
  } else {
    answer.innerHTML = "3A AI received: " + question;
  }
}
</script>

</body>
</html>
