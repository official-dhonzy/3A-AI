<!DOCTYPE html>
<html>
<head>
  <title>3A AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <img src="logo.png" alt="3A AI Logo" width="120">

  <h1>🌍 3A AI</h1>

  <p><b>Accessible • Affordable • African AI</b></p>

  <p>Your AI assistant for African solutions.</p>


  <!-- Question + AI Type -->
  <div>
    <input id="question" type="text" placeholder="Ask 3A AI anything...">

    <select id="answerType">
      <option value="general">🤖 General AI</option>
      <option value="location">🌍 Location AI</option>
    </select>
  </div>


  <input id="imageInput" type="file" accept="image/*">


  <!-- Location Selection -->
  <div id="locationOptions" style="display:none;">

    <h3>🌍 Choose Location</h3>

    <select id="continent">
      <option value="">Choose Continent</option>
      <option value="Africa">🌍 Africa</option>
      <option value="Asia">🌏 Asia</option>
      <option value="Europe">🌍 Europe</option>
      <option value="North America">🌎 North America</option>
      <option value="South America">🌎 South America</option>
      <option value="Oceania">🌏 Oceania</option>
    </select>


    <select id="country">
      <option value="">Choose Country</option>
    </select>

  </div>


  <div>
    <button onclick="startVoice()">🎤</button>
    <button onclick="askAI()">Ask</button>
  </div>


  <div id="answer">
    Hello! I am 3A AI. How can I help you today?
  </div>


  <h2>💬 Chat History</h2>

  <div id="history"></div>


  <h2>Explore Africa's Solutions</h2>

  <button onclick="askCategory('Agriculture')">🌱 Agriculture</button>
  <button onclick="askCategory('Education')">📚 Education</button>
  <button onclick="askCategory('Health')">🏥 Health</button>
  <button onclick="askCategory('Sanitation')">🚰 Sanitation</button>


  <!-- Language at bottom -->
  <h3>🌐 Language</h3>

  <select id="language">
    <option value="English">🇬🇧 English</option>
    <option value="French">🇫🇷 French</option>
    <option value="Spanish">🇪🇸 Spanish</option>
    <option value="Portuguese">🇵🇹 Portuguese</option>
    <option value="Twi">🇬🇭 Twi</option>
    <option value="Ewe">🇬🇭 Ewe</option>
    <option value="Hausa">🇳🇬 Hausa</option>
    <option value="Swahili">🇰🇪 Swahili</option>
    <option value="Zulu">🇿🇦 Zulu</option>
  </select>


</div>


<script type="module" src="firebase.js"></script>
<script type="module" src="ai.js"></script>
<script src="script.js"></script>


<script>

function askCategory(topic) {

  document.getElementById("question").value =
  "Give me solutions about " + topic;

  askAI();

}


function startVoice() {

  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {

    alert("Voice input is not supported in this browser.");
    return;

  }


  const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;


  const recognition = new SpeechRecognition();

  recognition.lang = "en-US";

  recognition.start();


  recognition.onresult = function(event) {

    const text = event.results[0][0].transcript;

    document.getElementById("question").value = text;

    askAI();

  };

}

</script>


</body>
</html>
