<!DOCTYPE html>
<html>
<head>
  <title>3A AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>3A AI</h1>
  <p>Accessible • Affordable • African AI</p>

  <input id="question" type="text" placeholder="Ask 3A AI anything...">

  <button onclick="askAI()">Ask</button>

  <p id="answer">Your answer will appear here.</p>

  <h2>Explore Africa's Solutions</h2>

  <button onclick="document.getElementById('question').value='agriculture'; askAI();">
    🌱 Agriculture
  </button>

  <button onclick="document.getElementById('question').value='education'; askAI();">
    📚 Education
  </button>

  <button onclick="document.getElementById('question').value='health'; askAI();">
    🏥 Health
  </button>

  <button onclick="document.getElementById('question').value='sanitation'; askAI();">
    🚰 Sanitation
  </button>

</div>


<script type="module" src="ai.js?v=3"></script>


<script>
window.askAI = async function () {

  let question = document.getElementById("question").value;
  let answer = document.getElementById("answer");

  if (question.trim() === "") {
    answer.innerHTML = "Please ask a question.";
    return;
  }

  answer.innerHTML = "3A AI is thinking...";

  try {
    let result = await window.ask3AAI(question);
    answer.innerHTML = result;
  } catch (error) {
    answer.innerHTML = "Error: " + error.message;
  }

};

</script>
