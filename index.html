<!DOCTYPE html>
<html>
<head>
  <title>3A AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>🌍 3A AI</h1>
  <p><b>Accessible • Affordable • African AI</b></p>

  <p>
    Your AI assistant for African solutions.
    Ask questions about farming, education, health, sanitation, and more.
  </p>

  <input id="question" type="text" placeholder="Ask 3A AI anything...">

  <button onclick="askAI()">Ask</button>

  <div id="answer">
    Hello! I am 3A AI. How can I help you today?
  </div>

  <h2>Explore Africa's Solutions</h2>

  <button onclick="askAI(); question.value='Agriculture'">
    🌱 Agriculture
  </button>

  <button onclick="askAI(); question.value='Education'">
    📚 Education
  </button>

  <button onclick="askAI(); question.value='Health'">
    🏥 Health
  </button>

  <button onclick="askAI(); question.value='Sanitation'">
    🚰 Sanitation
  </button>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="ai.js"></script>
<script src="script.js"></script>

</body>
</html>
