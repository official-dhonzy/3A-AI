<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3A AI - Login & Signup</title>

<link rel="stylesheet" href="style.css">

<!-- PWA Meta Tags -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#008000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="3A AI">

<style>
.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #111 0%, #1e1e1e 100%);
  padding: 20px;
}

.auth-box {
  background: #181818;
  border-radius: 20px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
}

.auth-header {
  text-align: center;
  margin-bottom: 30px;
}

.auth-header h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.auth-header p {
  color: #999;
  font-size: 14px;
}

.auth-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 25px;
  background: #222;
  padding: 5px;
  border-radius: 10px;
}

.auth-tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: #999;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  border-radius: 8px;
  transition: all 0.3s ease;
}

.auth-tab.active {
  background: #2ecc71;
  color: black;
}

.auth-form {
  display: none;
}

.auth-form.active {
  display: block;
}

.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  font-size: 12px;
  color: #999;
  margin-bottom: 5px;
  text-transform: uppercase;
}

.form-group input {
  width: 100%;
  padding: 12px;
  border: 1px solid #333;
  background: #222;
  color: white;
  border-radius: 8px;
  font-size: 14px;
  transition: border-color 0.3s ease;
}

.form-group input:focus {
  outline: none;
  border-color: #2ecc71;
}

.password-toggle {
  position: relative;
}

.password-toggle button {
  position: absolute;
  right: 12px;
  top: 35px;
  background: none;
  border: none;
  color: #999;
  cursor: pointer;
  font-size: 16px;
  padding: 0;
}

.error-message {
  background: #e63946;
  color: white;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 15px;
  display: none;
}

.error-message.show {
  display: block;
}

.success-message {
  background: #2ecc71;
  color: black;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 15px;
  display: none;
}

.success-message.show {
  display: block;
}

.auth-button {
  width: 100%;
  padding: 12px;
  background: #2ecc71;
  color: black;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.3s ease;
}

.auth-button:hover {
  background: #27a55f;
  transform: translateY(-2px);
}

.auth-button:active {
  transform: translateY(0);
}

.guest-button {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: #999;
  border: 1px solid #333;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.3s ease;
}

.guest-button:hover {
  border-color: #999;
  color: white;
}

.auth-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #666;
}
</style>

</head>


<body>


<div class="auth-container">

<div class="auth-box">

<div class="auth-header">
<h1>
🌍 
<span class="red">3</span>
<span class="yellow">A</span>
<span class="green">AI</span>
</h1>
<p>Accessible • Affordable • African AI</p>
</div>

<div class="auth-tabs">
<button class="auth-tab active" onclick="switchTab('login')">
Sign In
</button>
<button class="auth-tab" onclick="switchTab('signup')">
Create Account
</button>
</div>

<!-- LOGIN FORM -->
<div id="login" class="auth-form active">

<div class="error-message" id="loginError"></div>
<div class="success-message" id="loginSuccess"></div>

<div class="form-group">
<label>Email Address</label>
<input 
id="loginEmail"
type="email"
placeholder="Enter your email"
>
</div>

<div class="form-group password-toggle">
<label>Password</label>
<input 
id="loginPassword"
type="password"
placeholder="Enter your password"
>
<button type="button" onclick="togglePassword('loginPassword')">👁️</button>
</div>

<button class="auth-button" onclick="handleLogin()">
Sign In
</button>

</div>

<!-- SIGNUP FORM -->
<div id="signup" class="auth-form">

<div class="error-message" id="signupError"></div>
<div class="success-message" id="signupSuccess"></div>

<div class="form-group">
<label>Email Address</label>
<input 
id="signupEmail"
type="email"
placeholder="Enter your email"
>
</div>

<div class="form-group">
<label>Full Name (Optional)</label>
<input 
id="signupName"
type="text"
placeholder="Your name"
>
</div>

<div class="form-group password-toggle">
<label>Password</label>
<input 
id="signupPassword"
type="password"
placeholder="Create a password (min 6 chars)"
>
<button type="button" onclick="togglePassword('signupPassword')">👁️</button>
</div>

<div class="form-group password-toggle">
<label>Confirm Password</label>
<input 
id="signupConfirm"
type="password"
placeholder="Confirm your password"
>
<button type="button" onclick="togglePassword('signupConfirm')">👁️</button>
</div>

<button class="auth-button" onclick="handleSignup()">
Create Account
</button>

</div>

<!-- GUEST BUTTON -->
<button class="guest-button" onclick="location.href='home.html'">
Continue as Guest
</button>

<div class="auth-footer">
By using 3A AI, you agree to our terms of service
</div>

</div>

</div>


<script type="module">

import { auth } from "./firebase.js";
import { createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

// Tab switching
window.switchTab = function(tab) {
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  
  document.getElementById('loginError').classList.remove('show');
  document.getElementById('signupError').classList.remove('show');
};

// Password visibility toggle
window.togglePassword = function(fieldId) {
  const field = document.getElementById(fieldId);
  const isPassword = field.type === 'password';
  field.type = isPassword ? 'text' : 'password';
};

// Show error
function showError(elementId, message) {
  const el = document.getElementById(elementId);
  el.textContent = message;
  el.classList.add('show');
}

// Show success
function showSuccess(elementId, message) {
  const el = document.getElementById(elementId);
  el.textContent = message;
  el.classList.add('show');
}

// Clear messages
function clearMessages(formType) {
  document.getElementById(formType + 'Error').classList.remove('show');
  document.getElementById(formType + 'Success').classList.remove('show');
}

// Handle Login
window.handleLogin = async function() {
  clearMessages('login');
  
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  
  if (!email || !password) {
    showError('loginError', '⚠️ Please fill in all fields');
    return;
  }
  
  if (!email.includes('@')) {
    showError('loginError', '⚠️ Please enter a valid email');
    return;
  }
  
  try {
    await signInWithEmailAndPassword(auth, email, password);
    showSuccess('loginSuccess', '✅ Login successful! Redirecting...');
    setTimeout(() => location.href = 'home.html', 1000);
  } catch (error) {
    showError('loginError', '❌ ' + (error.message.includes('user-not-found') ? 'Email not found' : error.message.includes('wrong-password') ? 'Wrong password' : error.message));
  }
};

// Handle Signup
window.handleSignup = async function() {
  clearMessages('signup');
  
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('signupConfirm').value;
  
  if (!email || !password || !confirm) {
    showError('signupError', '⚠️ Please fill in all required fields');
    return;
  }
  
  if (!email.includes('@')) {
    showError('signupError', '⚠️ Please enter a valid email');
    return;
  }
  
  if (password.length < 6) {
    showError('signupError', '⚠️ Password must be at least 6 characters');
    return;
  }
  
  if (password !== confirm) {
    showError('signupError', '⚠️ Passwords do not match');
    return;
  }
  
  try {
    await createUserWithEmailAndPassword(auth, email, password);
    showSuccess('signupSuccess', '✅ Account created! Redirecting...');
    setTimeout(() => location.href = 'home.html', 1000);
  } catch (error) {
    showError('signupError', '❌ ' + (error.message.includes('email-already-in-use') ? 'Email already registered' : error.message));
  }
};

</script>

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>


</body>

</html>
