<script>

function askQuestion(question) {
  // Store the question and navigate to chat
  localStorage.setItem('pendingQuestion', question);
  location.href = 'chat.html';
}

// On chat.html, load the pending question if it exists
window.addEventListener('load', function() {
  const pendingQuestion = localStorage.getItem('pendingQuestion');
  if (pendingQuestion && document.getElementById('question')) {
    document.getElementById('question').value = pendingQuestion;
    localStorage.removeItem('pendingQuestion');
  }
});

</script>
