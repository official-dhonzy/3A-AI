<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3A AI Settings</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="top-bar">

<button onclick="location.href='menu.html'">
☰
</button>

<h1>
🌍
<span class="red">3</span>
<span class="yellow">A</span>
<span class="green">AI</span>
</h1>

</header>




<div class="page">


<h2>
⚙️ Settings
</h2>



<div class="card">

<h3>
🌍 Region & Language
</h3>


<label>Country</label>

<select id="country">

<option>Ghana</option>

<option>Nigeria</option>

<option>Kenya</option>

<option>South Africa</option>

<option>Egypt</option>

<option>Ethiopia</option>

<option>Uganda</option>

<option>United States</option>

<option>United Kingdom</option>

<option>Other</option>

</select>




<label>Language</label>


<select id="language">

<option>English</option>

<option>French</option>

<option>Arabic</option>

<option>Swahili</option>

<option>Twi</option>

<option>Ewe</option>

<option>Yoruba</option>

</select>

</div>




<div class="card">

<h3>
🎨 Theme
</h3>


<label>
<input type="checkbox" id="darkMode" checked> Dark Mode (Currently On)
</label>

<p style="font-size: 12px; color: #999; margin-top: 8px;">
🔴 Red • 🟡 Yellow • 🟢 Green (African Colors)
</p>

</div>




<div class="card">

<h3>
🤖 AI Model
</h3>


<p>
<strong>Current Model:</strong> Gemini 2.0 Flash Lite
</p>

<p style="font-size: 12px; color: #999; margin-top: 8px;">
3A AI Assistant powered by Google Gemini
</p>

</div>




<div class="card">

<h3>
🔔 Notifications
</h3>


<label>
<input type="checkbox" id="notifications" checked> Enable Chat Notifications
</label>

</div>




<button onclick="saveSettings()" style="background: #2ecc71; margin-bottom: 60px;">
💾 Save Settings
</button>



<button onclick="location.href='home.html'">
🏠 Back Home
</button>



</div>



<nav class="bottom-nav">

<button onclick="location.href='home.html'">
🏠
</button>

<button onclick="location.href='chat.html'">
💬
</button>

<button onclick="location.href='profile.html'">
👤
</button>

<button onclick="location.href='settings.html'">
⚙️
</button>

</nav>




<script>


// Load settings on page load
window.addEventListener('DOMContentLoaded', function() {
  
  const savedCountry = localStorage.getItem('country');
  const savedLanguage = localStorage.getItem('language');
  const savedDarkMode = localStorage.getItem('darkMode');
  const savedNotifications = localStorage.getItem('notifications');
  
  if (savedCountry) {
    document.getElementById('country').value = savedCountry;
  }
  
  if (savedLanguage) {
    document.getElementById('language').value = savedLanguage;
  }
  
  // Dark mode defaults to true if not set
  const darkModeCheckbox = document.getElementById('darkMode');
  if (savedDarkMode === 'false') {
    darkModeCheckbox.checked = false;
  } else {
    darkModeCheckbox.checked = true;
  }
  
  if (savedNotifications === 'false') {
    document.getElementById('notifications').checked = false;
  } else {
    document.getElementById('notifications').checked = true;
  }
  
  // Apply dark mode on load
  applyDarkMode(darkModeCheckbox.checked);
  
});


// Dark mode toggle listener
document.addEventListener('DOMContentLoaded', function() {
  const darkModeCheckbox = document.getElementById('darkMode');
  darkModeCheckbox.addEventListener('change', function() {
    applyDarkMode(this.checked);
  });
});


// Apply dark mode styling
function applyDarkMode(isDark) {
  const body = document.body;
  
  if (isDark) {
    body.style.background = '#111';
    body.style.color = 'white';
    document.documentElement.style.setProperty('--bg-primary', '#111');
    document.documentElement.style.setProperty('--bg-secondary', '#1e1e1e');
  } else {
    body.style.background = '#f5f5f5';
    body.style.color = '#333';
    document.documentElement.style.setProperty('--bg-primary', '#f5f5f5');
    document.documentElement.style.setProperty('--bg-secondary', '#ffffff');
  }
}


function saveSettings() {
  
  const country = document.getElementById('country').value;
  const language = document.getElementById('language').value;
  const darkMode = document.getElementById('darkMode').checked;
  const notifications = document.getElementById('notifications').checked;
  
  // Save to localStorage
  localStorage.setItem('country', country);
  localStorage.setItem('language', language);
  localStorage.setItem('darkMode', darkMode);
  localStorage.setItem('notifications', notifications);
  
  alert('✅ Settings saved!');
  
}


</script>


</body>

</html>
