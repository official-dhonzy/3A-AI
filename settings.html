<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3A AI Settings</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="top-bar">

<button onclick="location.href='menu.html'">
☰
</button>


<h1>
🌍
<span class="red">3</span>
<span class="yellow">A</span>
<span class="green">AI</span>
</h1>

</header>




<div class="page">


<h2>
⚙️ Settings
</h2>



<div class="card">

<h3>
Theme
</h3>

<p>
🔴🟡🟢 3A AI African Theme
</p>

</div>




<div class="card">

<h3>
Language
</h3>

<p>
English
</p>

</div>




<div class="card">

<h3>
AI Model
</h3>

<p>
Gemini AI
</p>

</div>





<div class="card">

<h3>
🌍 Continent
</h3>


<select id="continent" onchange="changeCountries()">

<option>Africa</option>

<option>Asia</option>

<option>Europe</option>

<option>North America</option>

<option>South America</option>

<option>Oceania</option>


</select>


</div>






<div class="card">

<h3>
🌎 Country
</h3>


<select id="country">


<option>Ghana</option>


<option>Nigeria</option>


<option>Kenya</option>


<option>South Africa</option>


<option>Egypt</option>


</select>


</div>





</div>




<script>

function changeCountries(){


let continent =
document.getElementById("continent").value;


let country =
document.getElementById("country");



country.innerHTML = "";



let countries = {



"Africa":[
"Ghana",
"Nigeria",
"Kenya",
"South Africa",
"Egypt",
"Ethiopia",
"Tanzania",
"Uganda"
],



"Asia":[
"China",
"India",
"Japan",
"South Korea",
"Indonesia"
],



"Europe":[
"United Kingdom",
"Germany",
"France",
"Italy",
"Spain"
],



"North America":[
"United States",
"Canada",
"Mexico"
],



"South America":[
"Brazil",
"Argentina",
"Colombia"
],



"Oceania":[
"Australia",
"New Zealand"
]

};



countries[continent].forEach(function(name){


let option =
document.createElement("option");


option.text =
name;


country.add(option);


});


}

</script>



</body>

</html>
