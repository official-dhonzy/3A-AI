<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3A AI Settings</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header>

<h1>
🌍 
<span class="red">3</span>
<span class="yellow">A</span>
<span class="green">AI</span>
</h1>

<p>Settings</p>

</header>




<div class="settings-box">


<h2>⚙️ Settings</h2>



<label>
🌍 Country
</label>

<select id="country">

<option>Ghana</option>

<option>Nigeria</option>

<option>Kenya</option>

<option>South Africa</option>

<option>Egypt</option>

<option>United States</option>

<option>United Kingdom</option>

<option>Other</option>

</select>





<label>
🗣️ Language
</label>


<select id="language">

<option>English</option>

<option>French</option>

<option>Arabic</option>

<option>Swahili</option>

<option>Twi</option>

<option>Ewe</option>

</select>





<label>
🤖 AI Model
</label>


<div class="setting-card">

Gemini AI

<br>

3A AI Assistant

</div>





<label>
🎨 Theme
</label>


<div class="setting-card">

🔴 Red  
🟡 Yellow  
🟢 Green  

<br>

African Theme

</div>





<button onclick="saveSettings()">

Save Settings

</button>



<button onclick="location.href='home.html'">

Back Home

</button>



</div>


</div>





<script>


function saveSettings(){


const country =
document.getElementById("country").value;


const language =
document.getElementById("language").value;



localStorage.setItem(
"country",
country
);


localStorage.setItem(
"language",
language
);



alert(
"✅ Settings saved!"
);


}



</script>


</body>

</html>
