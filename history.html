<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3A AI History</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="top-bar">

<button onclick="location.href='menu.html'">
☰
</button>


<h1>
🌍
<span class="red">3</span>
<span class="yellow">A</span>
<span class="green">AI</span>
</h1>

</header>




<div class="page">

<h2>
📜 Chat History
</h2>


<div id="history">

<p>Loading...</p>

</div>


</div>




<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {

getFirestore,

collection,

getDocs

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyDcY0jmGCWwGlbjtgKvwAGx--YzXdal2wY",

authDomain: "a-ai-d738d.firebaseapp.com",

projectId: "a-ai-d738d",

storageBucket: "a-ai-d738d.firebasestorage.app",

messagingSenderId: "337673964829",

appId: "1:337673964829:web:f10a8f1f8af9cae2a7e5f4"

};



const app = initializeApp(firebaseConfig);


const db = getFirestore(app);



const historyBox =
document.getElementById("history");




async function loadChats(){


try{


const snapshot =
await getDocs(collection(db,"chats"));



historyBox.innerHTML = "";



if(snapshot.empty){


historyBox.innerHTML =
"No conversations yet.";


return;


}



snapshot.forEach((doc)=>{


const chat = doc.data();



historyBox.innerHTML += `

<div class="card">

<h3>
You:
</h3>

<p>
${chat.question}
</p>


<h3>
🌍 3A AI:
</h3>

<p>
${chat.answer}
</p>


</div>

`;



});



}

catch(error){


historyBox.innerHTML =
"Error loading history";


console.log(error);


}



}



loadChats();



</script>



</body>

</html>
